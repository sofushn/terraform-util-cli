version: 2

project_name: terraform-util

before:
  hooks:
    - go mod tidy

builds:
  - id: terraform-util
    main: ./cmd/terraform-util
    binary: terraform-util
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: terraform-util
    ids:
      - terraform-util
    formats:
      - binary
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- if eq .Os "darwin" }}macos{{ else }}{{ .Os }}{{ end }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

release:
  name_template: "{{ .Tag }}"
  footer: |
    ## Artifacts

    This release includes binary artifacts for Linux, macOS, and Windows.

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
